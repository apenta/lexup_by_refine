services:
  - type: web
    name: my-flask-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --pythonpath src/lexup_by_refine app:app
    envVars:
      - key: STRIPE_SECRET
        sync: true
      - key: STRIPE_WEBHOOK_SECRET
        sync: true
      - key: AIRTABLE_TOKEN
        sync: trues
      - key: AIRTABLE_ID
        sync: true